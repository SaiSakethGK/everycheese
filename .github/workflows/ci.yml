# ──────────────────────────────────────────────────────────────────────────────
# CheeseAtlas — GitHub Actions CI/CD Pipeline
# Author: Sai Saketh Gooty Kase
#
# Triggers:  push / PR to main or develop
# Jobs:
#   lint    — flake8 + isort check
#   test    — pytest with coverage, Python 3.10 + 3.11 matrix
#   docker  — build Docker image (on main only)
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_DEFAULT: "3.11"

jobs:

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8 + isort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 isort

      - name: flake8
        run: flake8 everycheese config --max-line-length=79

      - name: isort (check only)
        run: isort --check-only --diff everycheese config

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: everycheese
          POSTGRES_USER: everycheese
          POSTGRES_PASSWORD: everycheese
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/local.txt

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DATABASE_URL: postgres://everycheese:everycheese@localhost:5432/everycheese
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          coverage run -m pytest --tb=short -q
          coverage report --fail-under=70
          coverage xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_DEFAULT
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: everycheese-coverage

  # ── Docker build ──────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: everycheese:${{ github.sha }}
